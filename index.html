<!doctype html>
<html lang="en" class="anim-pop">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <title>EGORITHM</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="field"><div id="world"></div></div>

  <div id="menu" class="glass">
    <button id="orb" aria-label="Menu">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
    </button>
    <div class="menu-items">
      <button data-action="shuffle">Shuffle</button>
      <button data-action="background">Background</button>
      <div class="swatches"></div>
      <button data-action="animation">Animation</button>
      <div class="anims"></div>
      <button data-action="upload">Upload</button>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" hidden />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
