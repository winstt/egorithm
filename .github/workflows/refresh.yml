name: Refresh IG token

on:
  schedule:
    # 1st and 15th of every month at 06:00 UTC (token valid 60 days, so twice a month is safe)
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh token
        id: refresh
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          NEW_TOKEN=$(node scripts/refresh.mjs)
          echo "::add-mask::$NEW_TOKEN"
          echo "token=$NEW_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Store refreshed token as secret
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          echo -n "${{ steps.refresh.outputs.token }}" | \
            gh secret set IG_ACCESS_TOKEN --repo winstt/egorithm

      # Commit a keepalive file so GitHub doesn't disable cron workflows
      # after 60 days of repo inactivity.
      - name: Keepalive commit
        run: |
          git config user.name  "egorithm-bot"
          git config user.email "bot@egorithm"
          date -u +%Y-%m-%dT%H:%M:%SZ > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
