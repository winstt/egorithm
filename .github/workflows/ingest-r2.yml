name: Ingest IG → R2

# Manual backfill of the Instagram archive into Cloudflare R2. Runs in the cloud
# so it doesn't depend on the owner's local network (which SNI-blocks
# r2.cloudflarestorage.com). Writes + commits data/r2-manifest.json.

on:
  workflow_dispatch:
    inputs:
      max_posts:
        description: 'Max posts (50 = trial; 100000 = all ~2251)'
        required: false
        default: '50'
      thumbs:
        description: 'Thumbnails (0/1) — 1 needs a Linux thumbnailer, keep 0 for now'
        required: false
        default: '0'

concurrency:
  group: feed-write
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Ingest into R2
        env:
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: egorithm-media
          MAX_POSTS: ${{ inputs.max_posts }}
          THUMBS: ${{ inputs.thumbs }}
        run: node scripts/ingest-r2.mjs

      - name: Commit manifest
        run: |
          git config user.name  "egorithm-bot"
          git config user.email "bot@egorithm"
          git add data/r2-manifest.json
          git diff --cached --quiet && echo "no manifest change" && exit 0
          git commit -m "ingest: r2 manifest $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep 5
          done

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: r2-manifest
          path: data/r2-manifest.json
